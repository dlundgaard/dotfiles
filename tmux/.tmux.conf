set -g default-terminal "screen-256color"
set -g mouse on
set -g status-fg white
set -g status-bg black
set -g renumber-windows on
set -g base-index 1
set -g set-titles on
set -g set-titles-string "#{pane_current_path}"
set -g automatic-rename off
setw -g pane-base-index 1
bind-key C new-window -c "#{pane_current_path}"
bind-key -n ñ previous-window
bind-key -n µ next-window
bind-key -n $ select-pane -t :.+
bind-key -n √ split-window -v -c "#{pane_current_path}"
bind-key -n « split-window -h -c "#{pane_current_path}"
bind-key -n ∫ break-pane
